<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXELI 3D | Premium Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="z-axis-bg">
        <div class="crosshair" style="top: 10%; left: 10%;">+</div>
        <div class="crosshair" style="bottom: 15%; left: 20%;">+</div>
    </div>

    <header>
        <h1>VOXELI <span class="highlight">3D</span></h1>
    </header>

    <main class="menu-container" id="menu-container"></main>

    <div id="model-modal" class="modal hidden">
        <div class="modal-glass">
            <div id="close-btn" class="close-btn">&times;</div>
            <div id="3d-viewer" class="viewer-container">
                <div id="loading-text">HAZIRLANIYOR...</div>
            </div>
            <div class="modal-info">
                <div class="info-header">
                    <h2 id="modal-title"></h2>
                    <span class="modal-price-tag" id="modal-price"></span>
                </div>
                <div class="nutrition-row">
                    <div class="glass-box"><strong>Enerji</strong><span id="modal-calories"></span> kcal</div>
                    <div class="glass-box"><strong>Malzemeler</strong><span id="modal-ingredients"></span></div>
                </div>
                <div class="action-buttons">
                    <a id="ar-link" href="#" rel="ar" class="ar-btn">🧊 Masamda Göster</a>
                    <button class="order-btn">Sepete Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
