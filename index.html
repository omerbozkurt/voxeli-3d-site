<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXELI 3D | Akıllı Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="z-axis-bg">
        <div class="crosshair" style="top: 10%; left: 10%;">+</div>
        <div class="crosshair" style="top: 20%; right: 15%;">+</div>
        <div class="crosshair" style="bottom: 15%; left: 20%;">+</div>
        <div class="crosshair" style="top: 50%; right: 5%;">+</div>
    </div>

    <header class="hero-section">
        <div class="hero-content">
            <h1>VOXELI <span class="highlight">3D</span></h1>
            <p>Yeni Nesil Dijital Menü Deneyimi</p>
        </div>
    </header>

    <main class="menu-container" id="menu-container"></main>

    <div id="model-modal" class="modal hidden">
        <div class="modal-glass">
            <span class="close-btn" id="close-btn">&times;</span>
            
            <div id="3d-viewer" class="viewer-container">
                <div id="loading-text">Model İşleniyor...</div>
            </div>
            
            <div class="modal-info">
                <div class="info-header">
                    <h2 id="modal-title">Ürün Adı</h2>
                    <span class="modal-price-tag" id="modal-price">0 ₺</span>
                </div>
                <p id="modal-desc"></p>
                
                <div class="nutrition-row">
                    <div class="nutri-box glass-box">
                        <strong>Enerji</strong>
                        <span><span id="modal-calories">0</span> kcal</span>
                    </div>
                    <div class="nutri-box glass-box">
                        <strong>İçindekiler</strong>
                        <span id="modal-ingredients">...</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="ar-btn" class="ar-btn">🧊 Masamda Göster</button>
                    <button class="order-btn">Sepete Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
